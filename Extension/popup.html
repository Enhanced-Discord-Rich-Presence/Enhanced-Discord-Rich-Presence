<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 420px; font-family: -apple-system, sans-serif; padding: 15px; background: #f8f9fa; color: #333; }
    h2 { font-size: 16px; margin-bottom: 15px; color: #d32f2f; text-align: center; }
    .section { background: white; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; }
    h3 { margin: 0 0 10px 0; font-size: 13px; text-transform: uppercase; color: #666; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .group { margin-bottom: 10px; padding: 8px; background: #fcfcfc; border: 1px dashed #ccc; border-radius: 4px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 5px 0; gap: 10px; }
    label { font-size: 11px; font-weight: 600; flex: 1; }
    input[type="text"], input[type="number"] { padding: 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; }
    .wide { width: 100%; margin-top: 2px; margin-bottom: 5px; box-sizing: border-box; }
    .footer { position: sticky; bottom: 0; background: #f8f9fa; padding-top: 10px; }
    .btn-save { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-save:hover { background: #218838; }
    .url-valid { border-color: #28a745 !important; }
    .url-invalid { border-color: #d32f2f !important; }
  </style>
</head>
<body>
  <h2>Advanced Monitor Config</h2>

  <div class="section">
    <h3>Global</h3>
    <div class="row"><label>RPC Master Switch</label><input type="checkbox" id="rpcEnabled"></div>
    <div class="row"><label>Info Popups</label><input type="checkbox" id="informationPopups"></div>
  </div>

  <div id="settings-container">
    <div class="section" id="section_yt">
      <h3>YouTube (Main)</h3>
      <div class="row"><label>Enabled</label><input type="checkbox" id="yt_enabled"></div>
      <div class="row"><label>Type (0, 2, 3)</label><input type="number" id="yt_type"></div>
      <label>Details</label><input type="text" id="yt_details" class="wide">
      <label>State</label><input type="text" id="yt_state" class="wide">
      
      <div class="group">
        <label>Assets (Large / Small)</label>
        <div class="row">L: <input type="checkbox" id="yt_l_en"> <input type="text" id="yt_l_img" placeholder="Img URL"> <input type="text" id="yt_l_txt" placeholder="Hover Text"></div>
        <div class="row">S: <input type="checkbox" id="yt_s_en"> <input type="text" id="yt_s_img" placeholder="Img URL"> <input type="text" id="yt_s_txt" placeholder="Hover Text"></div>
      </div>

      <div class="group">
        <label>Buttons (Label / URL)</label>
        <div class="row">1: <input type="checkbox" id="yt_b1_en"> <input type="text" id="yt_b1_lab" placeholder="Label"> <input type="text" id="yt_b1_url" placeholder="URL"></div>
        <div class="row">2: <input type="checkbox" id="yt_b2_en"> <input type="text" id="yt_b2_lab" placeholder="Label"> <input type="text" id="yt_b2_url" placeholder="URL"></div>
      </div>
    </div>

    <div class="section" id="section_ytm">
      <h3>YouTube Music</h3>
      <div class="row"><label>Enabled</label><input type="checkbox" id="ytm_enabled"></div>
      <div class="row"><label>Type (0, 2, 3)</label><input type="number" id="ytm_type"></div>
      <label>Details</label><input type="text" id="ytm_details" class="wide">
      <label>State</label><input type="text" id="ytm_state" class="wide">
      
      <div class="group">
        <label>Assets (Large / Small)</label>
        <div class="row">L: <input type="checkbox" id="ytm_l_en"> <input type="text" id="ytm_l_img" placeholder="Img URL"> <input type="text" id="ytm_l_txt" placeholder="Hover Text"></div>
        <div class="row">S: <input type="checkbox" id="ytm_s_en"> <input type="text" id="ytm_s_img" placeholder="Img URL"> <input type="text" id="ytm_s_txt" placeholder="Hover Text"></div>
      </div>

      <div class="group">
        <label>Buttons (Label / URL)</label>
        <div class="row">1: <input type="checkbox" id="ytm_b1_en"> <input type="text" id="ytm_b1_lab" placeholder="Label"> <input type="text" id="ytm_b1_url" placeholder="URL"></div>
        <div class="row">2: <input type="checkbox" id="ytm_b2_en"> <input type="text" id="ytm_b2_lab" placeholder="Label"> <input type="text" id="ytm_b2_url" placeholder="URL"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-save" id="saveBtn">Apply All Changes</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
