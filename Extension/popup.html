<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced RPC Configuration</title>
<link rel="stylesheet" href="popup.css">


</head>
<body>
<div class="app-container">

    <header>
        <h1 class="logo">
            <div id="rpc-status-dot" class="status-dot active"></div>
            Enhanced<span style="color: var(--indigo-500)">RPC</span>
        </h1>
        <div class="top-btns">
            <button id="cat-power" class="cat-btn on">
                <img id="cat-image" class="cat-image" src="None">
            </button>
            <button id="master-power" class="btn-power on">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
            </button>
        </div>
    </header>

    <div id="update-banner" class="update-banner" style="display:none">
        <div class="update-banner__text">
            <span id="update-banner-title" class="update-banner__title">App update available</span>
            <div class="update-banner__mute">
                <span class="update-banner__mute-text">Mute update notifications</span>
                <label class="checkbox-container update-banner__mute-toggle" title="When enabled, update popups will not be shown (native missing will still show).">
                    <input id="mute-update-notifications" type="checkbox">
                    <div class="checkbox-custom">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
                    </div>
                </label>
            </div>
        </div>
        <button id="update-banner-link" class="update-banner__link" type="button">Download</button>
    </div>

    <div class="quick-toggles">
        <div id="toggle-status" class="toggle-card">    
            <span class="toggle-label">RPC STATUS</span>
            <div class="toggle-value">
                <div id="status-indicator" class="indicator" style="background: var(--green-500); box-shadow: 0 0 8px var(--green-500);"></div>
                <span id="status-text" class="toggle-text">Activated</span>
            </div>
        </div>
        <div id="toggle-popups" class="toggle-card">
            <span class="toggle-label">Popups</span>
            <div class="toggle-value">
                <div id="popups-indicator" class="indicator" style="background: var(--indigo-500); box-shadow: 0 0 8px var(--indigo-500);"></div>
                <span id="popups-text" class="toggle-text">Enabled</span>
            </div>
        </div>
    </div>

    <div id="main-content" class="custom-scrollbar">
        <div id="platforms-container"></div>
    </div>

    <div id="footer-actions" class="footer-actions">
        <button id="btn-reload-presence" class="btn-primary">Reload Presence</button>
        <button id="btn-toast-trigger" class="btn-settings" type="button" title="Select active tab for RPC" aria-label="Select the currently active YouTube/YouTube Music tab for RPC">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/><path d="M14 10a1.5 1.5 0 0 0-2-1"/>
            </svg>
        </button>
    </div>
</div>

<img id="cat-jump" class="cat-jump-img" src="assets/jam_cat_rez_0.8.png" height="50px" hidden>

<script src="popup.js"></script>
</body>
</html>
