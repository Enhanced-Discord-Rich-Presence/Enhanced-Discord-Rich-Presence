name: Dev Build

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        default: v1.0.0_dev
      platform:
        required: true
        type: choice
        default: 'both'
        options:
          - both
          - windows
          - linux

env:
  VERSION: ''
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(_[a-zA-Z0-9]+)?$ ]]; then
            echo "Invalid version format. Expected format: vX.Y.Z (optionally with _dev suffix)."
            exit 1
          fi

  prepare:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Normalize version
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create version artifact
        run: |
          mkdir -p src/App
          echo "${{ steps.ver.outputs.version }}" > src/App/version.txt

      - name: Upload version artifact
        uses: actions/upload-artifact@v6
        with:
          name: version-metadata
          path: src/App/version.txt

  windows:
    needs: prepare
    if: ${{ inputs.platform == 'both' || inputs.platform == 'windows' }}
    uses: ./.github/workflows/windows-build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  linux:
    needs: prepare
    if: ${{ inputs.platform == 'both' || inputs.platform == 'linux' }}
    uses: ./.github/workflows/linux-build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
